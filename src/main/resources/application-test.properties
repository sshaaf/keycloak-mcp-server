# ============================================================
# TEST PROFILE CONFIGURATION
# ============================================================
# Uses Quarkus Dev Services to auto-start a Keycloak TestContainer
# Run with: mvn test
# ============================================================

# Enable Keycloak Dev Services (TestContainers)
quarkus.keycloak.devservices.enabled=true
quarkus.keycloak.devservices.realm-path=deploy/quarkus-realm.json
quarkus.keycloak.devservices.image-name=quay.io/keycloak/keycloak:26.0

# Admin credentials for TestContainers (creates admin user automatically)
quarkus.keycloak.devservices.users.admin.password=admin
quarkus.keycloak.devservices.users.admin.roles=admin

# Dev credentials for KeycloakClientFactory to use in tests
# These are set as system properties so KeycloakClientFactory can use them
kc.dev.user=admin
kc.dev.password=admin

# TestContainers will set these automatically via ${keycloak.url}
quarkus.oidc.auth-server-url=${keycloak.url}/realms/quarkus
quarkus.oidc.token.issuer=${keycloak.url}/realms/quarkus
quarkus.keycloak.admin-client.server-url=${keycloak.url}

# Disable OIDC authentication for simpler testing
quarkus.http.auth.permission.mcp.policy=permit
quarkus.oidc.enabled=false

# Use random port in tests to avoid conflicts
quarkus.http.port=0

# Enable all commands in tests (including delete for cleanup)
# Leave disabled empty by not setting keycloak.mcp.commands.disabled

