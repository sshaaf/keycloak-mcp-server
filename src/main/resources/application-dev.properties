# ============================================================
# DEV PROFILE CONFIGURATION
# ============================================================
# Uses external Keycloak instance configured via environment variables
# Run with: KC_URL=http://localhost:8180 mvn quarkus:dev
# ============================================================

# Fixed port for development
quarkus.http.port=8080

# Disable authentication for convenience during development
quarkus.http.auth.permission.mcp.policy=permit
quarkus.oidc.enabled=false

# Dev Services disabled - use external Keycloak
quarkus.keycloak.devservices.enabled=false

# Trust self-signed certificates in dev
quarkus.tls.trust-all=true

# Enable all commands in development
keycloak.mcp.commands.enable-all-by-default=true
keycloak.mcp.commands.disabled=

