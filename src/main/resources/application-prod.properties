# ============================================================
# PROD PROFILE CONFIGURATION
# ============================================================
# Uses external Keycloak with full authentication enabled
# Run with: java -jar target/quarkus-app/quarkus-run.jar
# Required env: KC_URL, KC_REALM, OIDC_CLIENT_ID
# ============================================================

# Fixed port for production
quarkus.http.port=8080

# Authentication ENABLED in production
quarkus.http.auth.permission.mcp.policy=authenticated
quarkus.oidc.enabled=true

# Dev Services disabled
quarkus.keycloak.devservices.enabled=false

# Don't trust all certs in production (use proper CA)
quarkus.tls.trust-all=false

# Disable destructive operations in production
keycloak.mcp.commands.disabled=DELETE_USER,DELETE_REALM,DELETE_CLIENT,DELETE_GROUP,DELETE_CLIENT_ROLE,DELETE_AUTHENTICATION_FLOW

