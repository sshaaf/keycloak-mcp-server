# Test Configuration for Keycloak MCP Server

# Disable Keycloak DevServices (no Docker required for unit tests)
quarkus.devservices.enabled=false
quarkus.keycloak.devservices.enabled=false

# Mock Keycloak connection settings (not used by pure unit tests)
keycloak.url=http://localhost:8180
keycloak.admin.username=admin
keycloak.admin.password=admin

# Disable OIDC for tests
quarkus.oidc.enabled=false

# Test logging
quarkus.log.level=INFO
quarkus.log.category."dev.shaaf.keycloak".level=DEBUG

# MCP Server configuration
quarkus.mcp.servers.keycloak.enabled=true

# Command configuration - enable all by default for testing
keycloak.mcp.commands.enable-all-by-default=true
keycloak.mcp.commands.log-on-startup=true
