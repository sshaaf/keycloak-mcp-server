# Test profile merges with main resources application-test.properties (Keycloak TestContainers).
# Do not disable quarkus.keycloak.devservices here or integration tests cannot reach Keycloak.

quarkus.log.level=INFO
quarkus.log.category."dev.shaaf.keycloak".level=DEBUG

quarkus.mcp.servers.keycloak.enabled=true
keycloak.mcp.commands.enable-all-by-default=true
keycloak.mcp.commands.log-on-startup=true
